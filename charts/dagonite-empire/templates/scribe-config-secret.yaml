{{- if .Values.scribe.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: scribe-config-secret
type: Opaque
stringData:
  base-url: {{ .Values.scribe.ollama.baseUrl | quote }}
  embedding-model: {{ .Values.scribe.ollama.embeddingModel | quote }}
  chat-model: {{ .Values.scribe.ollama.chatModel | quote }}
  temperature: {{ .Values.scribe.ollama.temperature | quote }}
  max-tokens: {{ .Values.scribe.ollama.maxTokens | quote }}
  timeout-seconds: {{ .Values.scribe.ollama.timeoutSeconds | quote }}
  persona-file-path: {{ .Values.scribe.personaFilePath | quote }}
  system-prompt: {{ .Values.scribe.systemPrompt | quote }}
  top-k: {{ .Values.scribe.search.topK | quote }}
  similarity-threshold: {{ .Values.scribe.search.similarityThreshold | quote }}
{{- end }}
