# Default values for dagonite-empire.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/krystiankempski/dagoniteempire
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

imageCredentials:
  registry: ghcr.io
  username: user
  password: pass
  email: someone@host.com

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
readinessProbe:
  httpGet:
    path: /healthz
    port: 8080

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

persistence:
  upload:
    enabled: false
    ## dagonite-empire data Persistent Volume Storage Class
    ## If defined, storageClassName: <storageClass>
    ## If set to "-", storageClassName: "", which disables dynamic provisioning
    ## If undefined (the default) or set to null, no storageClassName spec is
    ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
    ##   GKE, AWS & OpenStack)
    ##
    # storageClass: "-"
    ##
    ## If you want to reuse an existing claim, you can pass the name of the PVC using
    ## the existingClaim variable
    # existingClaim: your-claim
    # subPath: some-subpath
    accessMode: ReadWriteOnce
    size: 1Gi
  ## Dedicated tiny PVC mounted at /app/Resources for SCRIBE assets
  ## (persona file, etc.). Kept separate from `upload` because /app/wwwroot/upload
  ## is served as static files by the .NET app — anything dropped there is public.
  ## The /app/Resources directory is otherwise empty in the published image,
  ## so the PVC mount does not shadow any application code.
  scribeResources:
    enabled: false
    # storageClass: "-"
    # existingClaim: your-claim
    accessMode: ReadWriteOnce
    size: 256Mi
    mountPath: /app/Resources

# Additional volumes on the output Deployment definition.
extraVolumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
extraVolumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# email settings
email:
  host: example.com
  port: "587"
  username: username@example.com
  password: example_pass
  from: username@example.com
  name: username@example.com
  enable_ssl: "True"

# accounts settings
enableTestAccounts: false
gameMasterEmail: gamemaster@example.com
gameMasterPassword: verysafepassword

# env setting - possible values: Development, Staging, Production
aspnetcoreEnvironment: Production

# debug errors
detailedErrors: false

# AutoMapper license key
autoMapper:
  licenseKey: ""

# postgresql settings
global:
  postgresql:
    auth:
      postgresPassword: pass
      username: user
      password: pass
      database: dagonitedb

# SCRIBE (AI memory) settings
# Talks to an Ollama-compatible server outside the cluster (e.g. host machine on LAN).
# All values can be overridden via the scribe-config-secret (rendered from these values).
scribe:
  # Enable/disable injection of SCRIBE env vars into the deployment.
  # When false, the app uses ScribeOptions defaults (localhost:11434).
  enabled: false
  ollama:
    # Full base URL where Ollama is reachable from the cluster.
    # Example: "http://192.168.1.20:11434"
    baseUrl: ""
    embeddingModel: "nomic-embed-text"
    chatModel: "gemma2:9b"
    temperature: "0.7"
    maxTokens: "2048"
    timeoutSeconds: "120"
  # Path inside the container where the persona file is read from.
  # Provide the file via the scribeResources PVC (e.g. `kubectl cp` it in)
  # mounted at /app/Resources by default. Empty string disables file lookup
  # and the app falls back to systemPrompt below.
  personaFilePath: "/app/Resources/scribe-persona.md"
  # Fallback system prompt used only when the persona file at personaFilePath
  # is missing or empty.
  systemPrompt: ""
  search:
    topK: "5"
    similarityThreshold: "0.5"
