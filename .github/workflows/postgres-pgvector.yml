name: Build postgres-pgvector

on:
  push:
    branches: [main]
    paths:
      - "charts/dagonite-empire/postgres-pgvector/**"
      - ".github/workflows/postgres-pgvector.yml"
  workflow_dispatch:
    inputs:
      bitnami_tag:
        description: "Bitnami PostgreSQL tag (PG major or full tag)"
        default: "16"
        required: true
      pgvector_version:
        description: "pgvector git tag"
        default: "v0.8.0"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      BITNAMI_TAG: ${{ github.event.inputs.bitnami_tag || '16' }}
      PGVECTOR_VERSION: ${{ github.event.inputs.pgvector_version || 'v0.8.0' }}
      IMAGE: ghcr.io/${{ github.repository_owner }}/postgresql-pgvector
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: charts/dagonite-empire/postgres-pgvector
          push: true
          build-args: |
            BITNAMI_TAG=${{ env.BITNAMI_TAG }}
            PGVECTOR_VERSION=${{ env.PGVECTOR_VERSION }}
          tags: |
            ${{ env.IMAGE }}:${{ env.BITNAMI_TAG }}
            ${{ env.IMAGE }}:${{ env.BITNAMI_TAG }}-${{ env.PGVECTOR_VERSION }}
            ${{ env.IMAGE }}:${{ env.BITNAMI_TAG }}-${{ env.PGVECTOR_VERSION }}-${{ github.sha }}
